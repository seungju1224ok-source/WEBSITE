<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SAFETIQUE | Safety, Designed for Your Brand.</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-warm-ivory: #FAF6EE;
            --card-white: #FFFFFF;
            --text-charcoal: #1F1F1F;
            --text-gray: #66615A;
            --orange-start: #F97316;
            --orange-end: #FDBA3B;
            --border-color: #EFEAE2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Noto Sans KR', 'Montserrat', sans-serif; 
            background-color: var(--bg-warm-ivory); 
            color: var(--text-charcoal); 
            line-height: 1.7; 
            overflow-x: hidden;
            word-break: keep-all;
        }

        /* 1. 오프닝 스플래시 애니메이션 (인트로 화면) */
        .splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--text-charcoal);
            z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            /* 2.5초 대기 후 화면이 위로 걷힘 */
            animation: slideUp 1.2s cubic-bezier(0.7, 0, 0.3, 1) 2.5s forwards;
        }
        .splash-logo img {
            height: 120px;
            /* 얇은 선 로고를 하얗고 굵게 보이도록 강제 필터 적용 */
            filter: brightness(0) invert(1) drop-shadow(1px 1px 0 #fff) drop-shadow(-1px -1px 0 #fff);
            opacity: 0;
            animation: pulseFade 1.5s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
        }
        .splash-text {
            color: #fff; font-family: 'Montserrat', sans-serif; font-size: 2.5rem; font-weight: 800;
            letter-spacing: 5px; margin-top: 24px; opacity: 0;
            animation: textFadeIn 1s ease 1s forwards;
        }

        @keyframes pulseFade {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes textFadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100vh); visibility: hidden; pointer-events: none; }
        }

        /* 공통 스타일 및 레이아웃 */
        .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
        .section { padding: 120px 0; border-bottom: 1px solid var(--border-color); }
        .section-title { font-size: 2.2rem; font-weight: 700; margin-bottom: 16px; color: var(--text-charcoal); }
        .section-subtitle { font-size: 1.1rem; color: var(--text-gray); margin-bottom: 60px; line-height: 1.6; }
        .text-center { text-align: center; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        
        /* 카드 호버 인터랙션 강화 */
        .card { 
            background-color: var(--card-white); border-radius: 24px; padding: 40px; 
            box-shadow: 0 10px 30px rgba(51, 49, 45, 0.03); border: 1px solid var(--border-color);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.5s ease;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px rgba(249, 115, 22, 0.1); border-color: #FDE8D7; }

        .image-placeholder { 
            background-color: #F3EDE2; border-radius: 16px; display: flex; 
            align-items: center; justify-content: center; color: var(--text-gray); font-size: 0.9rem;
            border: 1px dashed #DDD4C4; min-height: 240px; width: 100%; overflow: hidden;
            position: relative;
        }
        /* 이미지 전환 효과 (호버 시 약간의 줌인) */
        .image-placeholder:hover { background-color: #EBE1D0; transition: all 0.4s ease; }

        .badge {
            display: inline-block; background-color: #FFF3EA; color: var(--orange-start);
            padding: 6px 14px; border-radius: 30px; font-size: 0.85rem; font-weight: 700; margin-bottom: 16px;
        }

        /* 헤더 */
        header {
            position: fixed; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; z-index: 1000; transition: all 0.4s ease;
        }
        header.scrolled {
            background-color: rgba(250, 246, 238, 0.95); backdrop-filter: blur(10px); padding: 15px 5%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        
        .logo {
            font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.5rem;
            color: #fff; letter-spacing: 2px; cursor: pointer; text-decoration: none; transition: color 0.3s;
        }
        header.scrolled .logo { color: var(--text-charcoal); }
        
        nav { display: flex; gap: 40px; }
        nav a {
            color: #fff; text-decoration: none; font-size: 0.95rem; font-weight: 500;
            position: relative; padding-bottom: 5px; opacity: 0.9; transition: opacity 0.3s;
        }
        header.scrolled nav a { color: var(--text-charcoal); }
        nav a::after {
            content: ''; position: absolute; bottom: 0; left: 50%;
            width: 0; height: 2px; background-color: var(--orange-start);
            transition: all 0.3s ease; transform: translateX(-50%);
        }
        nav a:hover::after { width: 100%; }

        /* 히어로 배너 */
        .hero {
            position: relative; width: 100vw; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bg.jpg'); /* 수정된 부분 */
            background-size: cover;
            background-position: center; background-attachment: fixed; z-index: -2;
            animation: bgZoom 20s infinite alternate ease-in-out;
        }
        @keyframes bgZoom { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }
        
        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%); z-index: -1;
        }
        .hero-content { color: #fff; z-index: 1; padding: 0 20px; }
        
        /* 인트로 스플래시 화면이 끝난 후 순차적으로 텍스트가 뜨는 애니메이션 */
        .hero-content .sub-eng { font-size: 1.2rem; color: var(--orange-start); font-weight: 700; margin-bottom: 12px; letter-spacing: 1px; opacity: 0; animation: fadeInUp 1s ease 3.0s forwards; }
        .hero-content h1 { font-family: 'Montserrat', sans-serif; font-size: 4.5rem; font-weight: 800; margin-bottom: 24px; letter-spacing: 2px; opacity: 0; animation: fadeInUp 1s ease 3.2s forwards; }
        .hero-content p { font-size: 1.5rem; font-weight: 400; opacity: 0; animation: fadeInUp 1s ease 3.4s forwards; }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 스크롤 등장 애니메이션 및 지연(Delay) 효과 */
        .reveal { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.5, 0, 0, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .delay-1 { transition-delay: 0.1s; }
        .delay-2 { transition-delay: 0.3s; }
        .delay-3 { transition-delay: 0.5s; }
        .delay-4 { transition-delay: 0.7s; }

        /* 레이아웃 구성 */
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
        .problem-card h3 { font-size: 1.3rem; margin-bottom: 12px; color: var(--text-charcoal); display: flex; align-items: center; gap: 8px; }
        .problem-card h3::before { content: "✕"; color: var(--orange-start); font-weight: bold; }
        .problem-card p { color: var(--text-gray); font-size: 0.95rem; }
        
        .solution-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: center; }
        .solution-list { display: flex; flex-direction: column; gap: 20px; }
        .solution-item { display: flex; gap: 16px; background: var(--card-white); padding: 24px; border-radius: 16px; border: 1px solid var(--border-color); transition: transform 0.3s; }
        .solution-item:hover { transform: translateX(10px); border-color: var(--orange-start); }
        .solution-icon { width: 44px; height: 44px; background: #FFF3EA; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--orange-start); font-weight: 700; flex-shrink: 0; }
        .solution-content h4 { font-size: 1.1rem; margin-bottom: 4px; color: var(--text-charcoal); }
        .solution-content p { font-size: 0.95rem; color: var(--text-gray); }

        .market-tags { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
        .tag { background-color: #FAF6EE; color: var(--text-gray); font-size: 0.8rem; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border-color); }

        .process-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 24px; }
        .process-card { text-align: center; }
        .process-num { width: 60px; height: 60px; background: linear-gradient(135deg, var(--orange-start), var(--orange-end)); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 1.4rem; margin: 0 auto 20px; box-shadow: 0 8px 20px rgba(249, 115, 22, 0.3); transition: transform 0.3s; }
        .process-card:hover .process-num { transform: scale(1.1) rotate(10deg); }
        
        .case-container { background: var(--card-white); border-radius: 28px; border: 1px solid var(--border-color); padding: 60px; box-shadow: 0 15px 40px rgba(51, 49, 45, 0.04); }
        .before-after-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 40px; }
        .ba-title { text-align: center; font-size: 0.95rem; font-weight: 700; margin-bottom: 10px; color: var(--text-gray); }
        
        .feedback-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; text-align: center; margin-top: 40px; border-top: 1px solid var(--border-color); padding-top: 40px; }
        .stat-item .num { font-family: 'Montserrat', sans-serif; font-size: 2.8rem; font-weight: 800; color: var(--orange-start); line-height: 1.2; margin-bottom: 8px; }
        .stat-item .label { font-size: 0.9rem; font-weight: 500; color: var(--text-gray); }

        /* 푸터 - 2. 로고 크기 및 두께 수정 반영 */
        footer { background-color: #1A1F18; color: #ACAAA6; padding: 70px 0; font-size: 0.9rem; }
        .footer-container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 24px; max-width: 1140px; margin: 0 auto; padding: 0 24px; }
        .footer-brand { display: flex; align-items: center; gap: 16px; }

        @media (max-width: 992px) {
            .solution-grid { grid-template-columns: 1fr; }
            nav { display: none; }
            .hero-content h1 { font-size: 3rem; }
        }
    </style>
</head>
<body id="home">
